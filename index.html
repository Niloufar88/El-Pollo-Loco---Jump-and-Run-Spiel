<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>El Pollo Loco</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />

    <!-- FONT AWESOME -->
    <script
      src="https://kit.fontawesome.com/34f17cdf39.js"
      crossorigin="anonymous"
    ></script>

    <!-- FAVICON-->

    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/favicon_io (1)/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/favicon_io (1)/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="assets/favicon_io (1)/favicon-16x16.png"
    />
    <link rel="manifest" href="assets/favicon_io (1)/site.webmanifest" />
  </head>
  <body>
    <header>
      <!-- TITLE -->
      <h1>el pollo loco</h1>
    </header>

    <main>
      <!-- START SCREEN -->
      <div id="start-screen" class="start-screen">
        <img
          src="assets/img/9_intro_outro_screens/start/startscreen_1.png"
          alt="start-screen"
        />
        <div class="btns">
          <!-- GAME BUTTONS -->
          <div id="gameBtns">
            <!-- START GAME BUTTON -->
            <button id="startGame-btn" onclick="startGame()">Start Game</button>

            <!-- HOW TO PLAY -->
            <button
              id="howToPlay-btn"
              onclick="showRelevantContent(renderHowToPlayContent())"
            >
              How to Play
            </button>

            <!-- CONTROLS -->
            <button
              id="controls-btn"
              onclick="showRelevantContent(renderControlsContent())"
            >
              Controls
            </button>

            <!-- IMPRESSUM -->
            <button
              id="credits-btn"
              onclick="showRelevantContent(renderImpressumContent())"
            >
              Impressum
            </button>
          </div>

          <!-- CONFIG BUTTONS -->
          <div class="configBtns" data-id="welcome">
            <!-- MUTE BUTTON -->
            <button class="audio-btn" aria-label="audio-button">
              <img src="assets/Icons/volume-xmark-solid.png" alt="audio-btn" />
            </button>
            <!-- FULLSCREEN BUTTON -->
            <button class="fullScreen-btn" aria-label="fullscreen-button">
              <i class="fa-solid fa-expand"></i>
            </button>
          </div>
        </div>

        <div id="contents"></div>
      </div>

      <div id="win-lose-screen" class="win-lose-screen">
        <img src="" alt="win-lose-img" class="win-lose-img" />
      </div>

      <!-- CANVAS -->
      <div id="canvas-container" class="canvas-container">
        <!-- CANVAS -->
        <canvas id="myCanvas" width="720" height="480"> </canvas>

        <!-- CONFIG BUTTONS -->
        <div class="canvas-btns" data-id="canvas">
          <!-- MUTE BUTTON -->
          <button class="audio-btn" aria-label="audio-button">
            <img src="assets/Icons/volume-xmark-solid.png" alt="audio-btn" />
          </button>
          <!-- FULLSCREEN BUTTON -->
          <button class="fullScreen-btn" aria-label="fullscreen-button">
            <i class="fa-solid fa-expand"></i>
          </button>
          <button
            class="back-btn"
            aria-label="back-button"
            onclick="backToMenu(event)"
          >
            <i class="fa-solid fa-right-from-bracket"></i>
          </button>
        </div>
      </div>

      <div class="touchBtns">
        <div id="leftSide">
          <button class="arrow-btn" id="left-button" aria-label="left-button">
            <i class="fa-solid fa-arrow-left"></i>
          </button>
          <button class="arrow-btn" id="right-button" aria-label="right-button">
            <i class="fa-solid fa-arrow-right"></i>
          </button>
        </div>
        <div id="rightSide">
          <button class="arrow-btn" id="up-button" aria-label="up-button">
            <i class="fa-solid fa-arrow-up"></i>
          </button>
          <button class="arrow-btn" id="throw-button" aria-label="throw-button">
            <i class="fa-solid fa-arrows-to-circle"></i>
          </button>
        </div>
      </div>
    </main>

    <div id="orientationOverlay">
      <div class="modal">
        <div class="mobileRoration">
          <i class="fa-solid fa-mobile-screen-button"></i>
        </div>
        <p class="modal-text">Please rotate your device to landscape Mode.</p>
      </div>
    </div>

    <!-- Script Template -->

    <!-- JS SCRIPTS -->
    <script src="./Javascript/models/DrawableObjects.class.js"></script>
    <script src="./Javascript/models/MovableObject.class.js"></script>
    <script src="./Javascript/models/Character.class.js"></script>
    <script src="./Javascript/models/Chicken.class.js"></script>
    <script src="./Javascript/models/Endboss.class.js"></script>
    <script src="./Javascript/models/BackgroundObjects.class.js"></script>
    <script src="./Javascript/models/Clouds.class.js"></script>
    <script src="./Javascript/models/Keyboard.class.js"></script>
    <script src="./Javascript/models/CollectableObjects.class.js"></script>
    <script src="./Javascript/models/Bottle.class.js"></script>
    <script src="./Javascript/models/Coin.class.js"></script>
    <script src="./Javascript/models/ThrowabaleBottles.class.js"></script>
    <script src="./Javascript/models/World.class.js"></script>
    <script src="./Javascript/models/Audio.class.js"></script>
    <script src="./Javascript/models/StatusBar.class.js"></script>
    <script src="./Javascript/models/Level.class.js"></script>
    <script src="./Javascript/levels/level1.js"></script>

    <script src="templates.js"></script>
    <script src="scripts.js"></script>
    <script src="game.js"></script>
  </body>
</html>
