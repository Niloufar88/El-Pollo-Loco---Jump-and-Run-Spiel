<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>El Pollo Loco</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />

    <!-- FONT AWESOME -->
    <script
      src="https://kit.fontawesome.com/34f17cdf39.js"
      crossorigin="anonymous"
    ></script>

    <!-- FAVICON-->

    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/favicon_io (1)/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/favicon_io (1)/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="assets/favicon_io (1)/favicon-16x16.png"
    />
    <link rel="manifest" href="assets/favicon_io (1)/site.webmanifest" />
  </head>
  <body>
    <!-- TITLE -->
    <h1>el pollo loco</h1>

    <!-- START SCREEN -->
    <div id="startScreen">
      <div class="btns">
        <!-- GAME BUTTONS -->
        <div id="gameBtns">
          <!-- START GAME BUTTON -->
          <button id="startGame">Start Game</button>

          <!-- CONTROLS -->
          <button id="controls">Controls</button>

          <!-- IMPRESSUM -->
          <button id="credits">Impressum</button>

          <!-- HOW TO PLAY -->
          <button id="howToPlay">How to Play</button>
        </div>

        <!-- CONFIG BUTTONS -->
        <div id="configBtns">
          <!-- UNMUTE BUTTON -->
          <button id="unmute" aria-label="unmute-button">
            <i class="fa-solid fa-volume-high"></i>
          </button>
          <!-- MUTE BUTTON -->
          <button id="mute" aria-label="mute-button">
            <i class="fa-solid fa-volume-xmark"></i>
          </button>
          <!-- FULLSCREEN BUTTON -->
          <button id="fullScreen" aria-label="fullscreen-button">
            <i class="fa-solid fa-expand"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- CANVAS -->
    <canvas id="myCanvas" width="720" height="480"> </canvas>

    <!-- JS SCRIPTS -->
    <script src="./Javascript/models/DrawableObjects.class.js"></script>
    <script src="./Javascript/models/MovableObject.class.js"></script>
    <script src="./Javascript/models/Character.class.js"></script>
    <script src="./Javascript/models/Chicken.class.js"></script>
    <script src="./Javascript/models/Endboss.class.js"></script>
    <script src="./Javascript/models/BackgroundObjects.class.js"></script>
    <script src="./Javascript/models/Clouds.class.js"></script>
    <script src="./Javascript/models/Keyboard.class.js"></script>
    <script src="./Javascript/models/CollectableObjects.class.js"></script>
    <script src="./Javascript/models/Bottle.class.js"></script>
    <script src="./Javascript/models/Coin.class.js"></script>
    <script src="./Javascript/models/ThrowabaleBottles.class.js"></script>
    <script src="./Javascript/models/World.class.js"></script>
    <script src="./Javascript/models/StatusBar.class.js"></script>
    <script src="./Javascript/models/Level.class.js"></script>
    <script src="./Javascript/levels/level1.js"></script>

    <script src="game.js"></script>
  </body>
</html>
